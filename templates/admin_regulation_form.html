{% extends "base.html" %}
{% block title %}규정 등록{% endblock %}
{% block content %}
<section class="form-page">
    <p class="eyebrow">Admin</p>
    <h1>새 규정 등록</h1>
    <form class="edit-form" method="post" action="/admin/regulations">
        <label>규정명 <input name="title" required></label>
        <label>규정번호 <input name="regulation_number" placeholder="예: 인사-001"></label>
        <div class="form-grid">
            <label>분류
                <select name="category_id" required>
                    {% for category in categories %}
                    <option value="{{ category.id }}">{{ category.name }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>관리부서 <input name="department_name" placeholder="예: 인사팀" required></label>
        </div>
        <div class="form-grid">
            <label>버전명 <input name="version_label" value="제정" required></label>
            <label>개정유형
                <select name="amendment_type">
                    <option>제정</option>
                    <option>일부개정</option>
                    <option>전부개정</option>
                    <option>폐지</option>
                </select>
            </label>
        </div>
        <div class="form-grid">
            <label>공포/승인일 <input type="date" name="promulgation_date"></label>
            <label>시행일 <input type="date" name="effective_date" required></label>
        </div>
        <label>제정/개정이유 <textarea name="reason" rows="5"></textarea></label>

        <section class="section-editor">
            <div class="section-editor-head">
                <h2>본문 조문</h2>
                <span>조문 단위로 입력하면 상세 화면의 왼쪽 목차와 연결됩니다.</span>
            </div>
            {% for i in range(1, 7) %}
            <div class="section-row">
                <input name="section_numbers" value="제{{ i }}조" aria-label="조 번호">
                <input name="section_titles" placeholder="조문 제목" aria-label="조문 제목">
                <input name="section_notes" placeholder="개정태그 예: (2018.12.13. 신설)" aria-label="개정태그">
                <textarea name="section_contents" rows="4" placeholder="조문 내용"></textarea>
            </div>
            {% endfor %}
        </section>

        <button type="submit">등록</button>
    </form>
</section>
{% endblock %}
