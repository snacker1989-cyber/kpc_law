{% extends "base.html" %}
{% block title %}버전 추가{% endblock %}
{% block content %}
<section class="form-page">
    <p class="eyebrow">Admin</p>
    <h1>{{ regulation.title }} 개정 버전 추가</h1>
    <form class="edit-form" method="post" action="/admin/regulations/{{ regulation.id }}/versions" enctype="multipart/form-data">
        <div class="form-grid">
            <label>버전명 <input name="version_label" placeholder="예: 일부개정 2026.01.01" required></label>
            <label>개정유형
                <select name="amendment_type" required>
                    <option>일부개정</option>
                    <option>전부개정</option>
                    <option>제정</option>
                    <option>폐지</option>
                </select>
            </label>
        </div>
        <div class="form-grid">
            <label>공포/승인일 <input type="date" name="promulgation_date"></label>
            <label>시행일 <input type="date" name="effective_date" required></label>
        </div>
        <label>제정/개정이유 <textarea name="reason" rows="5"></textarea></label>

        <section class="section-editor">
            <div class="section-editor-head">
                <h2>본문 조문</h2>
                <span>개정 후 전문 기준으로 조문을 입력합니다.</span>
            </div>
            {% for i in range(1, 9) %}
            <div class="section-row">
                <input name="section_numbers" value="제{{ i }}조" aria-label="조 번호">
                <input name="section_titles" placeholder="조문 제목" aria-label="조문 제목">
                <input name="section_notes" placeholder="개정태그 예: (2018.12.13. 신설)" aria-label="개정태그">
                <textarea name="section_contents" rows="4" placeholder="조문 내용"></textarea>
            </div>
            {% endfor %}
        </section>

        <div class="form-grid">
            <label>별표/서식 제목 <input name="attachment_title"></label>
            <label>별표/서식 파일 <input type="file" name="attachment_file"></label>
        </div>
        <button type="submit">버전 추가</button>
    </form>
</section>
{% endblock %}
