<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}사내규정 정보센터{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="/">사내규정 정보센터</a>
        <form class="top-search" action="/regulations" method="get">
            <input name="q" value="{{ q|default('') }}" placeholder="규정 검색">
            <button type="submit">검색</button>
        </form>
        <nav class="top-nav">
            <a href="/regulations">규정 검색</a>
            <a href="/admin/regulations">관리자</a>
            <a href="/admin/links">관계망</a>
        </nav>
    </header>
    <main class="page {% block page_class %}{% endblock %}">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
